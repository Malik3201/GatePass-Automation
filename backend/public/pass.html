<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visitor Pass</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="stylesheet" href="/assets/css/pass.css" />
  </head>
  <body>
    <header class="site-header no-print">
      <div>
        <h1>Visitor Pass</h1>
        <div class="sub">
          <a href="/visitors.html">← Visitors</a> · <a href="/">Dashboard</a> ·
          <a href="/visitor-entry.html">New visitor</a>
        </div>
      </div>
    </header>

    <main class="pass-page">
      <div class="pass-actions no-print">
        <button class="btn" type="button" id="printBtn">Print</button>
        <a class="btn secondary" href="/visitor-entry.html">New visitor</a>
      </div>

      <div id="msg" class="msg" style="display: none"></div>

      <section class="pass-card" id="passCard">
        <div class="pass-logo-wrap">
          <img class="pass-logo" src="/assets/logo.jpeg" alt="Logo" width="200" height="80" decoding="async" />
        </div>

        <div class="pass-photo" id="photoBox">
          <div class="placeholder" id="photoPlaceholder">No photo</div>
          <img id="photoImg" alt="Visitor" style="display: none" />
        </div>

        <div class="pass-lines">
          <div class="pass-line"><div class="k">NAME</div><div class="v" id="v_name"></div></div>
          <div class="pass-line"><div class="k">CNIC</div><div class="v" id="v_cnic"></div></div>
          <div class="pass-line"><div class="k">COMPANY</div><div class="v" id="v_company"></div></div>
        </div>
      </section>
    </main>

    <script type="module" src="/assets/js/pass.js"></script>
  </body>
</html>
